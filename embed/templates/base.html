<!DOCTYPE html>
<html lang="{{ .Site.Language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Page }}{{ .Page.Frontmatter.Description }}{{ else }}{{ .Site.Description }}{{ end }}">
  <meta name="author" content="{{ .Site.Author }}">
  <link rel="stylesheet" href="/main.css">
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/code-theme.css">
  <link rel="icon" href="/favicon.svg">
  <script>
    (function() {
      var saved = localStorage.getItem('ss_theme') || 'system';
      var dark = window.matchMedia('(prefers-color-scheme: dark)');
      var name = saved === 'system' ? (dark.matches ? 'terminal' : 'light') : saved === 'light' ? 'light' : 'terminal';
      if (name !== '{{ .Theme }}') {
        document.write('<link rel="stylesheet" href="/' + name + '-theme.css" id="ss-theme-early">');
      }
      document.documentElement.setAttribute('data-code-theme', name === 'light' ? 'light' : 'dark');
    })();
  </script>
  {{ block "head" . }}{{ end }}
</head>
<body>
  <div class="terminal">
    <div class="terminal__titlebar">
      <div class="theme-toggle" id="theme-toggle">
        <button class="theme-toggle__btn theme-toggle__btn--active" data-theme="system" title="System">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <button class="theme-toggle__btn" data-theme="light" title="Light">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="theme-toggle__btn" data-theme="dark" title="Dark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <nav class="terminal__nav">
        {{ range .Nav }}
        <a href="{{ .Path }}" class="terminal__nav-link{{ if .IsActive }} terminal__nav-link--active{{ end }}" data-path="{{ .Path }}">{{ .Label }}</a>
        {{ end }}
      </nav>
    </div>
    <div class="terminal__body" id="terminal-body">
      <div class="terminal__output" id="terminal-output">
        {{ block "content" . }}{{ end }}
      </div>
      <div class="terminal__prompt-line" id="prompt-line">
        {{ if .Terminal.Prompt }}<span class="terminal__prompt" id="prompt-user">{{ .Terminal.Prompt }}</span>
        <span class="terminal__prompt-separator">:</span>{{ end }}
        <span class="terminal__prompt-path" id="prompt-path">~{{ .CurrentPath }}</span>
        <span class="terminal__prompt-separator">$</span>&nbsp;
        <input type="text" class="terminal__input" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>

  <script>window.__SITE_DATA__ = {{ .SiteDataJSON }};</script>
  <script>window.__CURRENT_PATH__ = "{{ .CurrentPath }}";</script>
  <script src="/terminal.js"></script>
</body>
</html>
