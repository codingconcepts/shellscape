{{ define "title" }}{{ .Page.Frontmatter.Title }} - {{ .Site.Title }}{{ end }}

{{ define "content" }}
<div class="content" id="page-content" data-template="page">
  {{ if .Page.BannerHTML }}
  <pre class="post-banner">{{ .Page.BannerHTML }}</pre>
  {{ end }}
  {{ .Page.HTMLContent }}
</div>
{{ end }}
