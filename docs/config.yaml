site:
  title: "Shellscape"
  description: "A static site generator that produces interactive terminal-themed websites"
  author: "Rob Reid"
  base_url: "https://shellscape.io"
  language: "en"

theme: "terminal"

nav:
  - label: "Home"
    path: "/"
  - label: "About"
    path: "/about"
  - label: "Docs"
    path: "/docs"

terminal:
  prompt: ""
  hint: "Type help for available commands, or click around to navigate."
  whoami: "Shellscape - by Rob Reid"
  banner:
    text: "s h e l l s c a p e"
    font: univers
    color_type: "gradient-lr"

blog:
  posts_dir: "docs"
  date_format: "2006-02-01"
  show_reading_time: true
  show_tags: true
  code_style_dark: "paraiso-dark"
  code_style_light: "paraiso-light"

footer:
  text: "Built with shellscape"
  links:
    - label: "GitHub"
      url: "https://github.com/codingconcepts/shellscape"
